<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Image Sequence</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fffaf0, #dbe9ff);
      font-family: 'Comic Sans MS', 'Segoe Print', cursive, sans-serif;
      color: #1d3fa4;
    }

    .page {
      text-align: center;
      width: 100%;
      max-width: 960px;
      padding: 32px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.5rem, 5vw, 4.8rem);
      color: #1a4c9f;
      text-shadow: 0 0 20px rgba(74, 144, 226, 0.3);
      animation: floatText 3s ease-in-out infinite;
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }

    .info {
      margin: 0 0 24px;
      font-size: 1.1rem;
      line-height: 1.6;
      color: #2a4f8f;
    }

    .slide-card {
      background: white;
      border-radius: 24px;
      border: 2px solid #9bb8ff;
      box-shadow: 0 16px 40px rgba(26, 70, 150, 0.14);
      overflow: hidden;
      max-width: 820px;
      margin: 0 auto 24px;
    }

    .slide-image,
    .slide-video {
      width: 100%;
      display: block;
      max-height: 620px;
      object-fit: cover;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .next-button,
    .home-button {
      padding: 14px 28px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: white;
      background: linear-gradient(135deg, #3b79f1, #1c4cb8);
      box-shadow: 0 14px 28px rgba(26, 79, 176, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
    }

    .next-button:hover,
    .home-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 30px rgba(26, 79, 176, 0.3);
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Birthday Sequence</h1>
    <p class="info" id="slideInfo">Starting with the first image in the sequence.</p>

    <div class="slide-card">
      <img id="slideImage" class="slide-image" src="./images/img4.jpg" alt="Birthday slide image">
      <video id="slideVideo" class="slide-video" controls style="display:none"></video>
    </div>

    <div class="controls">
      <button id="nextButton" class="next-button" onclick="nextSlide()">Next</button>
      <a class="home-button" href="birthday.html">Home</a>
    </div>
  </div>

  <script>
    const slides = [
      { type: 'image', src: './images/img4.jpg', info: 'Showing img4.jpg. Click Next to continue.' },
      { type: 'image', src: './images/img5.jpg', info: 'Showing img5.jpg. Click Next to continue.' },
      { type: 'image', src: './images/img6.jpg', info: 'Showing img6.jpg. Click Next to continue.' },
      { type: 'image', src: './images/img7.jpg', info: 'Showing img7.jpg. Click Next to continue.' },
      { type: 'image', src: './images/img8.jpg', info: 'Showing img8.jpg. Click Next to continue.' },
      { type: 'image', src: './images/img9.jpg', info: 'Showing img9.jpg. Click Next to continue.' },
      { type: 'video', src: './videos/birthday.mp4', info: 'Now showing your birthday video!' }
    ];

    let currentIndex = 0;
    const slideImage = document.getElementById('slideImage');
    const slideVideo = document.getElementById('slideVideo');
    const nextButton = document.getElementById('nextButton');
    const slideInfo = document.getElementById('slideInfo');

    function showSlide(index) {
      currentIndex = index;
      const slide = slides[index];
      slideInfo.textContent = slide.info;

      if (slide.type === 'image') {
        slideImage.src = slide.src;
        slideImage.style.display = 'block';
        slideVideo.style.display = 'none';
        nextButton.style.display = 'inline-flex';
        nextButton.textContent = index === slides.length - 2 ? 'Watch Video' : 'Next';
      } else {
        slideImage.style.display = 'none';
        slideVideo.style.display = 'block';
        slideVideo.src = slide.src;
        nextButton.style.display = 'none';
      }
    }

    function nextSlide() {
      if (currentIndex < slides.length - 1) {
        showSlide(currentIndex + 1);
      }
    }

    showSlide(0);
  </script>
</body>
</html>
