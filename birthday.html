<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Gols!</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fff7f1, #d8e4ff);
      font-family: 'Comic Sans MS', 'Segoe Print', cursive, sans-serif;
      color: #1d3fa4;
    }

    .page {
      text-align: center;
      max-width: 900px;
      width: 100%;
      padding: 30px;
      box-sizing: border-box;
    }

    .page h1 {
      margin-bottom: 20px;
      font-size: clamp(2.5rem, 5vw, 5rem);
      color: #1a4c9f;
      text-shadow: 0 0 20px rgba(74, 144, 226, 0.35);
      animation: floatText 3s ease-in-out infinite;
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }

    .main-image {
      width: 100%;
      max-width: 720px;
      border-radius: 24px;
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.15);
      border: 5px solid #5e88f0;
    }

    .next-button {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 28px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, #3b79f1, #1c4cb8);
      box-shadow: 0 14px 28px rgba(26, 79, 176, 0.24);
      transition: transform 0.2s ease;
    }

    .next-button:hover {
      transform: translateY(-3px);
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Happy Birthday Gols!</h1>
    <img class="main-image" src="./index.html/images/main.jpg" alt="Happy Birthday Gols">
    <div>
      <a class="next-button" href="happy-birthday-gols.html">Next</a>
    </div>
  </div>
</body>
</html>
